revolte:
  version: '1.0'
  project: jul new proj
  appName: jul app
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      codeReview: true
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    qa:
      codeReview: true
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    production:
      codeReview: true
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
