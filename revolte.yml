revolte:
  version: '1.0'
  project: sample project
  appName: sample app
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    qa:
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    production:
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    preview:
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
