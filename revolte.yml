revolte:
  version: '1.0'
  project: Test proj
  appName: New app
  config:
    codeReview:
      summarize: true
      suggestFixes: true
      commentStyle: Balanced
    testSuite:
      command: npm run test
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      codeReview: true
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    qa:
      codeReview: true
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    production:
      codeReview: true
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    preview:
      codeReview: true
      testSuite: true
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
